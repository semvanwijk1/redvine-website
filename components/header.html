<!-- REDVINE VINE-TRACK HEADER -->
<style>
    /* Kleurenpalet & Variabelen */
    :root {
        --red: #e31b23;
        --green: #2d6a4f;
        --white: #ffffff;
        --dark: #1a1a1a;
    }

    /* Header basis: Niet zwevend, gewoon strak bovenaan */
    .main-header {
        width: 100%;
        background-color: var(--white);
        border-bottom: 1px solid #eee;
        position: sticky; /* Blijft bovenin staan tijdens scrollen */
        top: 0;
        z-index: 9999;
        font-family: 'Segoe UI', sans-serif;
    }

    /* De bovenste balk met Logo en Menu */
    .header-top {
        max-width: 1400px; /* Lekker breed */
        margin: 0 auto;
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Logo Styling */
    .logo {
        font-size: 1.8rem;
        font-weight: 900;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    .logo .red-text { color: var(--red); }
    .logo .green-text { color: var(--green); }

    /* Navigatie Menu */
    .nav-links {
        display: flex;
        list-style: none;
        gap: 30px;
        margin: 0;
        padding: 0;
    }

    .nav-links a {
        text-decoration: none;
        color: var(--dark);
        font-weight: 700;
        font-size: 0.9rem;
        text-transform: uppercase;
        transition: color 0.3s ease;
    }

    .nav-links a:hover {
        color: var(--red);
    }

    /* Taal selector rechts */
    .lang-box {
        background: var(--red);
        color: white;
        padding: 6px 12px;
        border-radius: 4px;
        font-weight: 800;
        font-size: 0.8rem;
    }

    /* DE VINE-TRACK: De groene lijn onderaan de header */
    .vine-track {
        width: 100%;
        height: 4px;
        background: #f0f0f0; /* De "ongebruikte" rank */
        position: relative;
    }

    /* De actieve groene rank die groeit */
    .vine-progress {
        position: absolute;
        height: 100%;
        background: var(--green);
        width: 0%; /* Begint bij 0 */
        transition: width 0.1s linear;
    }

    /* DE BEWEGENDE TOMAAT: Gekoppeld aan de scroll */
    .vine-tomato {
        position: absolute;
        top: -12px; /* Plaatst de tomaat precies OP de lijn */
        left: 0%; /* Begint links */
        font-size: 24px;
        transform: translateX(-50%); /* Zorgt dat het midden van de tomaat op de lijn staat */
        transition: left 0.1s linear;
        user-select: none;
    }

    /* Responsive: menu weg op mobiel */
    @media (max-width: 900px) {
        .nav-links { display: none; }
    }
</style>

<header class="main-header">
    <div class="header-top">
        <!-- Logo -->
        <a href="index.html" class="logo">
            <span class="red-text">Red</span><span class="green-text">Vine</span>
        </a>

        <!-- Menu -->
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="over-ons.html">Over ons</a></li>
            <li><a href="assortiment.html">Assortiment</a></li>
            <li><a href="duurzaamheid.html">Duurzaamheid</a></li>
            <li><a href="vacatures.html">Werken bij</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <!-- Taal -->
        <div class="lang-box">🇳🇱 NL</div>
    </div>

    <!-- De Rank (De lijn waar de tomaat op rijdt) -->
    <div class="vine-track">
        <div class="vine-progress" id="progressLine"></div>
        <div class="vine-tomato" id="movingTomato">🍅</div>
    </div>
</header>

<script>
    // We gebruiken 'scroll' om de tomaat over de lijn te jagen
    window.onscroll = function() {
        // Bereken hoe ver de gebruiker heeft gescrold in procenten
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;

        // Update de breedte van de groene rank
        document.getElementById("progressLine").style.width = scrolled + "%";
        
        // Update de positie van de tomaat
        document.getElementById("movingTomato").style.left = scrolled + "%";
    };
</script>
