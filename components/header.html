<style>
    /* RESET EN BASIS VOOR DE NIEUWE HEADER */
    #rv-ultra-header {
        all: initial; /* Reset alles */
        display: block;
        width: 100%;
        background: #ffffff;
        position: fixed; /* Blijft altijd bovenin */
        top: 0;
        left: 0;
        z-index: 99999;
        border-bottom: 2px solid #f0f0f0;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    #rv-ultra-header .header-bar {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        max-width: 1400px !important;
        margin: 0 auto !important;
        height: 80px !important;
        padding: 0 40px !important;
        box-sizing: border-box !important;
    }

    /* Logo Styling */
    #rv-ultra-header .header-logo {
        font-size: 26px !important;
        font-weight: 900 !important;
        text-transform: uppercase !important;
        text-decoration: none !important;
        letter-spacing: 2px !important;
        flex-shrink: 0 !important;
    }
    #rv-ultra-header .header-logo .red { color: #e31b23 !important; }
    #rv-ultra-header .header-logo .green { color: #2d6a4f !important; }

    /* Menu Styling */
    #rv-ultra-header .header-menu {
        display: flex !important;
        list-style: none !important;
        gap: 30px !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    #rv-ultra-header .header-menu a {
        text-decoration: none !important;
        color: #1a1a1a !important;
        font-weight: 700 !important;
        font-size: 13px !important;
        text-transform: uppercase !important;
        white-space: nowrap !important;
        transition: color 0.3s ease !important;
    }

    #rv-ultra-header .header-menu a:hover {
        color: #e31b23 !important;
    }

    /* Taal Button */
    #rv-ultra-header .header-lang {
        background: #e31b23 !important;
        color: #ffffff !important;
        padding: 8px 16px !important;
        border-radius: 6px !important;
        font-size: 13px !important;
        font-weight: 800 !important;
        flex-shrink: 0 !important;
    }

    /* DE RANK EN DE TOMAAT */
    #rv-ultra-header .header-vine-track {
        width: 100% !important;
        height: 5px !important;
        background: #f4f4f4 !important;
        position: relative !important;
    }

    #rv-ultra-header .header-vine-progress {
        position: absolute !important;
        height: 100% !important;
        background: #2d6a4f !important;
        width: 0%;
        left: 0 !important;
    }

    #rv-ultra-header .header-tomato-scroller {
        position: absolute !important;
        top: -12px !important;
        left: 0%;
        font-size: 26px !important;
        transform: translateX(-50%) !important;
        transition: left 0.1s linear !important;
        z-index: 10 !important;
    }
</style>

<div id="rv-ultra-header">
    <div class="header-bar">
        <!-- Logo -->
        <a href="index.html" class="header-logo">
            <span class="red">Red</span><span class="green">Vine</span>
        </a>

        <!-- Menu -->
        <ul class="header-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="over-ons.html">Over ons</a></li>
            <li><a href="assortiment.html">Assortiment</a></li>

            <li><a href="contact.html">Contact</a></li>
        </ul>

        <!-- Taal -->

    </div>

    <!-- De Bewegende Rank (Lijn + Tomaat) -->
    <div class="header-vine-track">
        <div class="header-vine-progress" id="js-vine-line"></div>
        <div class="header-tomato-scroller" id="js-vine-tomato">🍅</div>
    </div>
</div>
