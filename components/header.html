<style>
    /* RESET VOOR DE HEADER - Voorkomt dat style.css dit verpest */
    #rv-header-container * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #rv-header-container {
        width: 100%;
        background: #ffffff;
        position: sticky;
        top: 0;
        z-index: 10000;
        border-bottom: 1px solid #eee;
    }

    .header-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        height: 80px;
    }

    /* Logo - RED in rood, VINE in groen */
    .rv-logo {
        text-decoration: none;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 1px;
        text-transform: uppercase;
        flex-shrink: 0; /* Voorkomt dat logo wordt ingedrukt */
    }
    .rv-logo .red { color: #e31b23; }
    .rv-logo .green { color: #2d6a4f; }

    /* Navigatie - Alles op één lijn */
    .rv-nav {
        display: flex;
        gap: 25px;
        list-style: none;
        align-items: center;
    }

    .rv-nav a {
        text-decoration: none;
        color: #333;
        font-weight: 700;
        font-size: 13px;
        text-transform: uppercase;
        white-space: nowrap; /* Voorkomt dat tekst onder elkaar gaat staan */
        transition: color 0.2s;
    }

    .rv-nav a:hover {
        color: #e31b23;
    }

    /* Taal-selector - Bescheiden en strak */
    .rv-lang {
        background: #f4f4f4;
        color: #333;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 800;
        border: 1px solid #ddd;
        flex-shrink: 0;
    }

    /* DE VINE TRACK (De lijn en de tomaat) */
    .vine-track-container {
        width: 100%;
        height: 4px;
        background: #f0f0f0;
        position: relative;
    }

    .vine-progress-line {
        position: absolute;
        height: 100%;
        background: #2d6a4f; /* De groene rank */
        width: 0%;
    }

    .scrolling-tomato {
        position: absolute;
        top: -12px;
        left: 0%;
        font-size: 22px;
        transform: translateX(-50%);
        transition: left 0.1s linear;
        cursor: default;
        user-select: none;
    }
</style>

<div id="rv-header-container">
    <div class="header-content">
        <!-- Logo -->
        <a href="index.html" class="rv-logo">
            <span class="red">Red</span><span class="green">Vine</span>
        </a>

        <!-- Menu -->
        <ul class="rv-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="over-ons.html">Over ons</a></li>
            <li><a href="assortiment.html">Assortiment</a></li>
            <li><a href="duurzaamheid.html">Duurzaamheid</a></li>
            <li><a href="vacatures.html">Werken bij</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <!-- Taal -->
        <div class="rv-lang">🇳🇱 NL</div>
    </div>

    <!-- Scroll-lijn met Tomaat -->
    <div class="vine-track-container">
        <div class="vine-progress-line" id="vineLine"></div>
        <div class="scrolling-tomato" id="rvTomato">🍅</div>
    </div>
</div>

<script>
    // Zorgt ervoor dat de tomaat beweegt op basis van scrollen
    window.addEventListener('scroll', function() {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;

        const line = document.getElementById("vineLine");
        const tomato = document.getElementById("rvTomato");

        if(line && tomato) {
            line.style.width = scrolled + "%";
            tomato.style.left = scrolled + "%";
        }
    });
</script>
