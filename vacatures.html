<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Werken bij RedVine? Bekijk onze openstaande vacatures en word onderdeel van ons innovatieve team.">
    <title>Werken bij RedVine | Vacatures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="container" style="padding: 60px 20px;">
        <h2>Word onderdeel van ons team</h2>
        <p style="margin-bottom: 40px;">Wil jij bijdragen aan een duurzame voedselvoorziening?</p>
        
        <div id="vacature-list">
            <!-- Voorbereid voor CMS -->
            <div class="card" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h4>Teeltspecialist</h4>
                    <small>Fulltime | Westland</small>
                </div>
                <a href="#" class="btn btn-secondary">Bekijk vacature</a>
            </div>
            <div class="card" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h4>Technisch Medewerker</h4>
                    <small>Fulltime | Westland</small>
                </div>
                <a href="#" class="btn btn-secondary">Bekijk vacature</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

<script>
    // 1. Header inladen
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            
            // 2. Scroll functie activeren
            window.addEventListener('scroll', function() {
                // Bereken hoe ver we zijn (0 tot 100)
                let winScroll = document.documentElement.scrollTop || document.body.scrollTop;
                let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                let scrolled = (winScroll / height) * 100;

                // Zoek de elementen
                let line = document.getElementById("vine-line-progress");
                let tomato = document.getElementById("vine-tomato-mover");

                // Pas de positie aan
                if (line && tomato) {
                    line.style.width = scrolled + "%";
                    tomato.style.left = scrolled + "%";
                }
            });
        });

    // 3. Footer inladen
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

</body>
</html>
